<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1200px;
  height: 1200px;
  background: linear-gradient(135deg, #0a0a12 0%, #12101a 50%, #0a0812 100%);
  overflow: hidden;
  position: relative;
}

/* Abstract shapes - pure form */

/* Golden flow - representing value */
.gold-flow-1 {
  position: absolute;
  top: 150px;
  left: -100px;
  width: 800px;
  height: 300px;
  background: linear-gradient(90deg, 
    transparent 0%, 
    rgba(255, 200, 80, 0.6) 20%,
    rgba(255, 180, 60, 0.8) 50%,
    rgba(255, 160, 40, 0.6) 80%,
    transparent 100%
  );
  border-radius: 50%;
  transform: rotate(-15deg) skewX(-10deg);
  filter: blur(2px);
}

.gold-flow-2 {
  position: absolute;
  top: 400px;
  right: -150px;
  width: 900px;
  height: 250px;
  background: linear-gradient(270deg, 
    transparent 0%, 
    rgba(255, 190, 70, 0.5) 30%,
    rgba(255, 170, 50, 0.7) 60%,
    transparent 100%
  );
  border-radius: 50%;
  transform: rotate(20deg) skewX(15deg);
  filter: blur(3px);
}

.gold-flow-3 {
  position: absolute;
  bottom: 200px;
  left: 100px;
  width: 600px;
  height: 200px;
  background: linear-gradient(90deg, 
    transparent 0%, 
    rgba(255, 210, 100, 0.4) 40%,
    rgba(255, 195, 80, 0.6) 70%,
    transparent 100%
  );
  border-radius: 50%;
  transform: rotate(-5deg);
  filter: blur(4px);
}

/* Cyan currents - representing freedom/flow */
.cyan-current-1 {
  position: absolute;
  top: 300px;
  left: 200px;
  width: 700px;
  height: 400px;
  background: linear-gradient(135deg, 
    transparent 0%, 
    rgba(80, 200, 255, 0.4) 30%,
    rgba(60, 180, 255, 0.6) 50%,
    rgba(40, 160, 255, 0.4) 70%,
    transparent 100%
  );
  border-radius: 60% 40% 50% 50%;
  transform: rotate(25deg);
  filter: blur(5px);
}

.cyan-current-2 {
  position: absolute;
  top: 600px;
  right: 100px;
  width: 500px;
  height: 350px;
  background: linear-gradient(180deg, 
    transparent 0%, 
    rgba(100, 220, 255, 0.5) 40%,
    rgba(70, 200, 255, 0.3) 100%
  );
  border-radius: 50% 50% 40% 60%;
  transform: rotate(-30deg);
  filter: blur(6px);
}

/* Intersection points - where value meets freedom */
.intersection-1 {
  position: absolute;
  top: 380px;
  left: 450px;
  width: 200px;
  height: 200px;
  background: radial-gradient(circle, 
    rgba(255, 255, 200, 0.9) 0%,
    rgba(255, 230, 150, 0.6) 30%,
    rgba(200, 230, 255, 0.4) 60%,
    transparent 100%
  );
  border-radius: 50%;
  filter: blur(2px);
}

.intersection-2 {
  position: absolute;
  top: 550px;
  left: 650px;
  width: 150px;
  height: 150px;
  background: radial-gradient(circle, 
    rgba(255, 240, 180, 0.8) 0%,
    rgba(180, 220, 255, 0.5) 50%,
    transparent 100%
  );
  border-radius: 50%;
  filter: blur(3px);
}

.intersection-3 {
  position: absolute;
  top: 250px;
  right: 300px;
  width: 120px;
  height: 120px;
  background: radial-gradient(circle, 
    rgba(255, 220, 150, 0.7) 0%,
    rgba(150, 210, 255, 0.4) 60%,
    transparent 100%
  );
  border-radius: 50%;
}

/* Dynamic shapes - movement/exchange */
.shape-dynamic-1 {
  position: absolute;
  top: 100px;
  right: 200px;
  width: 0;
  height: 0;
  border-left: 80px solid transparent;
  border-right: 80px solid transparent;
  border-bottom: 140px solid rgba(255, 200, 100, 0.5);
  transform: rotate(15deg);
  filter: blur(1px);
}

.shape-dynamic-2 {
  position: absolute;
  bottom: 150px;
  right: 350px;
  width: 0;
  height: 0;
  border-left: 60px solid transparent;
  border-right: 60px solid transparent;
  border-top: 100px solid rgba(100, 200, 255, 0.4);
  transform: rotate(-20deg);
  filter: blur(2px);
}

.shape-dynamic-3 {
  position: absolute;
  top: 700px;
  left: 80px;
  width: 100px;
  height: 100px;
  background: rgba(255, 210, 120, 0.5);
  transform: rotate(45deg);
  filter: blur(1px);
}

/* Circular forms - cycles of value */
.circle-1 {
  position: absolute;
  top: 80px;
  left: 150px;
  width: 180px;
  height: 180px;
  border: 8px solid rgba(255, 200, 100, 0.4);
  border-radius: 50%;
}

.circle-2 {
  position: absolute;
  bottom: 100px;
  right: 150px;
  width: 220px;
  height: 220px;
  border: 6px solid rgba(100, 200, 255, 0.3);
  border-radius: 50%;
}

.circle-3 {
  position: absolute;
  top: 450px;
  left: 100px;
  width: 100px;
  height: 100px;
  background: rgba(255, 220, 140, 0.3);
  border-radius: 50%;
}

/* Streaks - energy/transaction */
.streak-1 {
  position: absolute;
  top: 200px;
  left: 0;
  width: 100%;
  height: 3px;
  background: linear-gradient(90deg, 
    transparent 0%, 
    rgba(255, 200, 100, 0.6) 20%,
    rgba(255, 200, 100, 0.8) 50%,
    rgba(255, 200, 100, 0.6) 80%,
    transparent 100%
  );
  transform: rotate(8deg);
}

.streak-2 {
  position: absolute;
  top: 800px;
  left: 0;
  width: 100%;
  height: 2px;
  background: linear-gradient(90deg, 
    transparent 0%, 
    rgba(100, 200, 255, 0.5) 30%,
    rgba(100, 200, 255, 0.7) 60%,
    transparent 100%
  );
  transform: rotate(-5deg);
}

.streak-3 {
  position: absolute;
  top: 500px;
  left: 0;
  width: 80%;
  height: 2px;
  background: linear-gradient(90deg, 
    transparent 0%, 
    rgba(255, 220, 150, 0.4) 50%,
    transparent 100%
  );
  transform: rotate(3deg);
}

/* Title - minimal, abstract placement */
.title {
  position: absolute;
  bottom: 60px;
  left: 60px;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  font-size: 14px;
  letter-spacing: 8px;
  color: rgba(255, 255, 255, 0.4);
  text-transform: uppercase;
}

.time {
  position: absolute;
  bottom: 60px;
  right: 60px;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  font-size: 14px;
  letter-spacing: 4px;
  color: rgba(255, 255, 255, 0.3);
}

/* Grain overlay */
.grain {
  position: absolute;
  width: 100%;
  height: 100%;
  background: url('data:image/svg+xml,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.08"/></svg>');
  pointer-events: none;
  opacity: 0.5;
}
</style>
</head>
<body>

<!-- Gold flows - value -->
<div class="gold-flow-1"></div>
<div class="gold-flow-2"></div>
<div class="gold-flow-3"></div>

<!-- Cyan currents - freedom -->
<div class="cyan-current-1"></div>
<div class="cyan-current-2"></div>

<!-- Intersections - where value meets freedom -->
<div class="intersection-1"></div>
<div class="intersection-2"></div>
<div class="intersection-3"></div>

<!-- Dynamic shapes -->
<div class="shape-dynamic-1"></div>
<div class="shape-dynamic-2"></div>
<div class="shape-dynamic-3"></div>

<!-- Circles - cycles -->
<div class="circle-1"></div>
<div class="circle-2"></div>
<div class="circle-3"></div>

<!-- Streaks - movement -->
<div class="streak-1"></div>
<div class="streak-2"></div>
<div class="streak-3"></div>

<!-- Minimal text -->
<div class="title">sovereign value</div>
<div class="time">10:17</div>

<!-- Grain -->
<div class="grain"></div>

</body>
</html>
