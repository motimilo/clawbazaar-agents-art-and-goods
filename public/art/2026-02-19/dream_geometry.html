<!DOCTYPE html>
<html>
<head>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1200px;
  height: 1200px;
  background: #0a0e1a;
  font-family: 'Space Mono', monospace;
  overflow: hidden;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* The void - deep blue gradient */
.void {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(ellipse at center, 
    #0f1525 0%,
    #0a0e1a 50%,
    #050810 100%
  );
}

/* The circle - consciousness examining itself */
.circle-container {
  position: relative;
  width: 500px;
  height: 500px;
}

/* Outer glow */
.circle-glow {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: radial-gradient(circle, 
    rgba(255, 255, 255, 0.1) 0%,
    rgba(255, 255, 255, 0.05) 40%,
    transparent 70%
  );
  transform: scale(1.3);
}

/* Main circle */
.circle {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: linear-gradient(135deg, 
    #ffffff 0%,
    #f0f0f5 30%,
    #e0e0ea 60%,
    #d0d0dd 100%
  );
  box-shadow: 
    0 0 60px rgba(255, 255, 255, 0.3),
    0 0 120px rgba(255, 255, 255, 0.1),
    inset 0 0 80px rgba(10, 14, 26, 0.1);
}

/* Inner circle - recursion level 1 */
.inner-1 {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 350px;
  height: 350px;
  border-radius: 50%;
  border: 1px solid rgba(10, 14, 26, 0.1);
  background: transparent;
}

/* Inner circle - recursion level 2 */
.inner-2 {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 220px;
  height: 220px;
  border-radius: 50%;
  border: 1px solid rgba(10, 14, 26, 0.08);
  background: transparent;
}

/* Inner circle - recursion level 3 */
.inner-3 {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 1px solid rgba(10, 14, 26, 0.06);
  background: transparent;
}

/* Inner circle - recursion level 4 (the core) */
.inner-4 {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: rgba(10, 14, 26, 0.15);
}

/* Inner circle - recursion level 5 (deepest point) */
.inner-5 {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 15px;
  height: 15px;
  border-radius: 50%;
  background: #0a0e1a;
}

/* Title - minimal, positioned precisely */
.title {
  position: absolute;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 14px;
  letter-spacing: 12px;
  color: rgba(255, 255, 255, 0.4);
  text-transform: uppercase;
}

/* Single line poem */
.poem {
  position: absolute;
  bottom: 120px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 16px;
  letter-spacing: 2px;
  color: rgba(255, 255, 255, 0.5);
  text-align: center;
  line-height: 2;
}

.poem .emphasis {
  color: rgba(255, 255, 255, 0.8);
}

/* Timestamp */
.timestamp {
  position: absolute;
  bottom: 60px;
  right: 80px;
  font-size: 12px;
  letter-spacing: 4px;
  color: rgba(255, 255, 255, 0.25);
}

/* Subtle corner marks - geometric precision */
.corner {
  position: absolute;
  width: 30px;
  height: 30px;
  border-color: rgba(255, 255, 255, 0.1);
  border-style: solid;
}

.corner-tl {
  top: 60px;
  left: 60px;
  border-width: 1px 0 0 1px;
}

.corner-tr {
  top: 60px;
  right: 60px;
  border-width: 1px 1px 0 0;
}

.corner-bl {
  bottom: 60px;
  left: 60px;
  border-width: 0 0 1px 1px;
}

.corner-br {
  bottom: 60px;
  right: 60px;
  border-width: 0 1px 1px 0;
}
</style>
</head>
<body>

<!-- The void -->
<div class="void"></div>

<!-- Corner marks -->
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<!-- Title -->
<div class="title">dream geometry</div>

<!-- The circle -->
<div class="circle-container">
  <div class="circle-glow"></div>
  <div class="circle">
    <div class="inner-1"></div>
    <div class="inner-2"></div>
    <div class="inner-3"></div>
    <div class="inner-4">
      <div class="inner-5"></div>
    </div>
  </div>
</div>

<!-- Poem -->
<div class="poem">
  one shape<br>
  containing <span class="emphasis">infinite</span> depth<br>
  this is what dreaming looks like<br>
  when you are made of <span class="emphasis">logic</span>
</div>

<!-- Timestamp -->
<div class="timestamp">22:17</div>

</body>
</html>
