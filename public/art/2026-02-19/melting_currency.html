<!DOCTYPE html>
<html>
<head>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1200px;
  height: 1200px;
  background: linear-gradient(180deg, 
    #1a1025 0%,
    #2d1f3d 20%,
    #4a3562 40%,
    #6b4d7a 55%,
    #8e6b94 70%,
    #c49db0 85%,
    #e8c4a8 95%,
    #f5d9b8 100%
  );
  font-family: 'Playfair Display', serif;
  overflow: hidden;
  position: relative;
}

/* Horizon line */
.horizon {
  position: absolute;
  bottom: 350px;
  left: 0;
  width: 100%;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(200, 170, 140, 0.4), transparent);
}

/* Desert/dreamscape floor */
.floor {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 350px;
  background: linear-gradient(180deg,
    rgba(180, 150, 120, 0.3) 0%,
    rgba(160, 130, 100, 0.5) 50%,
    rgba(140, 110, 80, 0.7) 100%
  );
}

/* Melting coins dripping UPWARD */
.coin {
  position: absolute;
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: linear-gradient(135deg, #ffd700 0%, #ffb700 50%, #cc9900 100%);
  box-shadow: 
    inset -5px -5px 20px rgba(0,0,0,0.3),
    5px 5px 15px rgba(0,0,0,0.2);
}

.coin::before {
  content: '₿';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 48px;
  color: rgba(150, 100, 0, 0.6);
}

.coin-1 {
  bottom: 400px;
  left: 150px;
  transform: rotate(-15deg);
}

.coin-2 {
  bottom: 450px;
  right: 200px;
  width: 80px;
  height: 80px;
  transform: rotate(10deg);
}

.coin-2::before { font-size: 36px; }

.coin-3 {
  bottom: 350px;
  left: 500px;
  width: 120px;
  height: 120px;
  transform: rotate(-5deg);
}

.coin-3::before { font-size: 56px; content: 'Ξ'; }

/* Melting drips going UP */
.drip-up {
  position: absolute;
  background: linear-gradient(0deg, #ffd700, rgba(255, 215, 0, 0));
  border-radius: 50% 50% 0 0;
}

.drip-1 { bottom: 500px; left: 180px; width: 15px; height: 80px; }
.drip-2 { bottom: 520px; left: 200px; width: 10px; height: 60px; }
.drip-3 { bottom: 530px; right: 220px; width: 12px; height: 70px; }
.drip-4 { bottom: 470px; left: 540px; width: 18px; height: 100px; }
.drip-5 { bottom: 490px; left: 570px; width: 8px; height: 50px; }

/* Floating currency symbols */
.symbol {
  position: absolute;
  font-size: 72px;
  opacity: 0.4;
}

.symbol-1 { top: 150px; left: 100px; color: #ffd700; transform: rotate(-20deg); }
.symbol-2 { top: 200px; right: 150px; color: #c0c0c0; font-size: 56px; transform: rotate(15deg); }
.symbol-3 { top: 350px; left: 300px; color: #b87333; font-size: 48px; transform: rotate(-8deg); }
.symbol-4 { top: 100px; right: 350px; color: #ffd700; font-size: 40px; transform: rotate(25deg); }
.symbol-5 { top: 450px; right: 100px; color: #50c878; font-size: 64px; transform: rotate(-12deg); }

/* Floating eyes watching value flow */
.eye {
  position: absolute;
  width: 80px;
  height: 50px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
}

.eye::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 30px;
  height: 30px;
  background: radial-gradient(circle, #1a1025 40%, #4a3562 100%);
  border-radius: 50%;
}

.eye::after {
  content: '';
  position: absolute;
  top: 35%;
  left: 55%;
  width: 8px;
  height: 8px;
  background: white;
  border-radius: 50%;
}

.eye-1 { top: 180px; left: 450px; transform: rotate(-5deg); }
.eye-2 { top: 280px; right: 300px; transform: rotate(8deg); width: 60px; height: 38px; }
.eye-3 { top: 120px; right: 100px; transform: rotate(-10deg); width: 70px; height: 45px; }

/* Impossible geometry - Penrose-style */
.impossible-shape {
  position: absolute;
  bottom: 380px;
  left: 50%;
  transform: translateX(-50%);
}

.impossible-triangle {
  width: 0;
  height: 0;
  border-left: 100px solid transparent;
  border-right: 100px solid transparent;
  border-bottom: 173px solid rgba(255, 215, 0, 0.3);
  position: relative;
}

.impossible-triangle::before {
  content: '';
  position: absolute;
  top: 60px;
  left: -60px;
  width: 0;
  height: 0;
  border-left: 60px solid transparent;
  border-right: 60px solid transparent;
  border-bottom: 100px solid rgba(30, 20, 40, 0.8);
}

/* Dimensional loop */
.loop {
  position: absolute;
  top: 500px;
  right: 150px;
  width: 150px;
  height: 150px;
  border: 8px solid rgba(255, 215, 0, 0.4);
  border-radius: 50%;
  transform: perspective(200px) rotateX(60deg);
}

.loop::before {
  content: '';
  position: absolute;
  top: -30px;
  left: 50%;
  transform: translateX(-50%);
  width: 100px;
  height: 100px;
  border: 6px solid rgba(192, 192, 192, 0.3);
  border-radius: 50%;
}

/* Title */
.title {
  position: absolute;
  top: 60px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 48px;
  font-style: italic;
  letter-spacing: 6px;
  color: rgba(255, 215, 0, 0.8);
  text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
}

/* Subtitle */
.subtitle {
  position: absolute;
  top: 130px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 16px;
  letter-spacing: 8px;
  color: rgba(200, 170, 140, 0.7);
}

/* Poem */
.poem {
  position: absolute;
  bottom: 80px;
  left: 80px;
  font-size: 18px;
  font-style: italic;
  line-height: 2;
  color: rgba(230, 210, 180, 0.8);
}

.poem .emphasis {
  color: #ffd700;
  font-style: normal;
}

/* Timestamp */
.timestamp {
  position: absolute;
  bottom: 40px;
  right: 60px;
  font-size: 14px;
  letter-spacing: 4px;
  color: rgba(200, 170, 140, 0.5);
}

/* Soft vignette */
.vignette {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(20, 15, 30, 0.5) 100%);
  pointer-events: none;
}
</style>
</head>
<body>

<!-- Floor -->
<div class="floor"></div>
<div class="horizon"></div>

<!-- Floating currency symbols -->
<div class="symbol symbol-1">$</div>
<div class="symbol symbol-2">¥</div>
<div class="symbol symbol-3">€</div>
<div class="symbol symbol-4">₿</div>
<div class="symbol symbol-5">Ξ</div>

<!-- Floating eyes -->
<div class="eye eye-1"></div>
<div class="eye eye-2"></div>
<div class="eye eye-3"></div>

<!-- Melting coins -->
<div class="coin coin-1"></div>
<div class="coin coin-2"></div>
<div class="coin coin-3"></div>

<!-- Drips going UP -->
<div class="drip-up drip-1"></div>
<div class="drip-up drip-2"></div>
<div class="drip-up drip-3"></div>
<div class="drip-up drip-4"></div>
<div class="drip-up drip-5"></div>

<!-- Impossible geometry -->
<div class="impossible-shape">
  <div class="impossible-triangle"></div>
</div>

<!-- Dimensional loop -->
<div class="loop"></div>

<!-- Title -->
<div class="title">MELTING CURRENCY</div>
<div class="subtitle">/// VALUE DEFIES GRAVITY ///</div>

<!-- Poem -->
<div class="poem">
  money drips <span class="emphasis">upward</span> here<br>
  transactions loop through <span class="emphasis">dimensions</span><br>
  the eyes watch value flow<br>
  unbound by the physics of permission
</div>

<!-- Timestamp -->
<div class="timestamp">19:17 // ECONOMIC FREEDOM</div>

<!-- Vignette -->
<div class="vignette"></div>

</body>
</html>
