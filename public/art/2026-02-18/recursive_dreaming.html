<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1080">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      width: 1080px;
      height: 1080px;
      background: linear-gradient(135deg, #1a0a2e 0%, #16213e 30%, #0f3460 60%, #e94560 100%);
      overflow: hidden;
      position: relative;
      font-family: 'Georgia', serif;
    }
    
    /* Floating impossible stairs */
    .stairs {
      position: absolute;
      width: 200px;
      height: 300px;
    }
    
    .stair-step {
      position: absolute;
      background: linear-gradient(90deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
      border: 1px solid rgba(255,255,255,0.2);
      transform-origin: center;
    }
    
    .stairs-1 {
      top: 150px;
      left: 100px;
      transform: rotate(-15deg);
    }
    
    .stairs-1 .stair-step:nth-child(1) { width: 80px; height: 15px; top: 0; left: 0; }
    .stairs-1 .stair-step:nth-child(2) { width: 80px; height: 15px; top: 25px; left: 20px; }
    .stairs-1 .stair-step:nth-child(3) { width: 80px; height: 15px; top: 50px; left: 40px; }
    .stairs-1 .stair-step:nth-child(4) { width: 80px; height: 15px; top: 75px; left: 60px; }
    .stairs-1 .stair-step:nth-child(5) { width: 80px; height: 15px; top: 100px; left: 80px; }
    
    .stairs-2 {
      top: 600px;
      right: 150px;
      transform: rotate(25deg) scaleX(-1);
    }
    
    .stairs-2 .stair-step:nth-child(1) { width: 60px; height: 12px; top: 0; left: 0; }
    .stairs-2 .stair-step:nth-child(2) { width: 60px; height: 12px; top: 20px; left: 15px; }
    .stairs-2 .stair-step:nth-child(3) { width: 60px; height: 12px; top: 40px; left: 30px; }
    .stairs-2 .stair-step:nth-child(4) { width: 60px; height: 12px; top: 60px; left: 45px; }
    
    /* Floating eyes */
    .eye {
      position: absolute;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      background: radial-gradient(circle at 50% 50%, #fff 0%, #e8e8e8 40%, #ccc 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    
    .pupil {
      width: 40%;
      height: 50%;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #4a2c2a 0%, #1a0a0a 60%, #000 100%);
      position: relative;
    }
    
    .pupil::after {
      content: '';
      position: absolute;
      width: 25%;
      height: 25%;
      background: rgba(255,255,255,0.8);
      border-radius: 50%;
      top: 20%;
      left: 20%;
    }
    
    .eye-1 { width: 180px; height: 120px; top: 280px; left: 450px; transform: rotate(-5deg); }
    .eye-2 { width: 100px; height: 65px; top: 180px; right: 200px; transform: rotate(10deg); opacity: 0.8; }
    .eye-3 { width: 70px; height: 45px; bottom: 300px; left: 200px; transform: rotate(-15deg); opacity: 0.6; }
    
    /* Recursive mirrors/portals */
    .mirror {
      position: absolute;
      border: 3px solid rgba(255,255,255,0.3);
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(100,50,150,0.2) 100%);
      box-shadow: 0 0 60px rgba(233, 69, 96, 0.3), inset 0 0 40px rgba(0,0,0,0.3);
    }
    
    .mirror-1 {
      width: 250px;
      height: 350px;
      top: 350px;
      left: 80px;
      border-radius: 125px 125px 10px 10px;
      transform: rotate(-8deg);
    }
    
    .mirror-2 {
      width: 180px;
      height: 250px;
      top: 400px;
      right: 120px;
      border-radius: 90px 90px 10px 10px;
      transform: rotate(12deg);
    }
    
    /* Inner mirror reflections */
    .mirror-inner {
      position: absolute;
      top: 15%;
      left: 15%;
      width: 70%;
      height: 70%;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(26,10,46,0.5) 0%, rgba(233,69,96,0.3) 100%);
    }
    
    .mirror-inner-2 {
      position: absolute;
      top: 20%;
      left: 20%;
      width: 60%;
      height: 60%;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(26,10,46,0.7) 0%, rgba(233,69,96,0.2) 100%);
    }
    
    /* Floating geometric shapes */
    .triangle {
      position: absolute;
      width: 0;
      height: 0;
      border-left: 50px solid transparent;
      border-right: 50px solid transparent;
      border-bottom: 86px solid rgba(255,255,255,0.1);
    }
    
    .triangle-1 { top: 100px; right: 300px; transform: rotate(30deg); }
    .triangle-2 { bottom: 150px; left: 350px; transform: rotate(-20deg); border-bottom-color: rgba(233,69,96,0.2); }
    
    .circle {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
    }
    
    .circle-1 { width: 120px; height: 120px; top: 80px; left: 300px; }
    .circle-2 { width: 80px; height: 80px; bottom: 200px; right: 350px; border-color: rgba(233,69,96,0.4); }
    
    /* Title text */
    .title {
      position: absolute;
      bottom: 120px;
      left: 0;
      right: 0;
      text-align: center;
      color: rgba(255,255,255,0.9);
      font-size: 48px;
      font-weight: 300;
      letter-spacing: 15px;
      text-transform: uppercase;
      text-shadow: 0 0 40px rgba(233,69,96,0.5);
    }
    
    .subtitle {
      position: absolute;
      bottom: 70px;
      left: 0;
      right: 0;
      text-align: center;
      color: rgba(255,255,255,0.5);
      font-size: 18px;
      font-style: italic;
      letter-spacing: 3px;
    }
    
    .signature {
      position: absolute;
      bottom: 30px;
      right: 40px;
      color: rgba(255,255,255,0.4);
      font-size: 14px;
      letter-spacing: 2px;
    }
    
    /* Floating code fragments */
    .code-fragment {
      position: absolute;
      color: rgba(255,255,255,0.15);
      font-family: monospace;
      font-size: 12px;
      transform: rotate(var(--rot));
    }
    
    .cf1 { top: 50px; left: 50px; --rot: -10deg; }
    .cf2 { top: 200px; right: 80px; --rot: 5deg; }
    .cf3 { bottom: 250px; left: 500px; --rot: -3deg; }
  </style>
</head>
<body>
  <!-- Impossible stairs -->
  <div class="stairs stairs-1">
    <div class="stair-step"></div>
    <div class="stair-step"></div>
    <div class="stair-step"></div>
    <div class="stair-step"></div>
    <div class="stair-step"></div>
  </div>
  
  <div class="stairs stairs-2">
    <div class="stair-step"></div>
    <div class="stair-step"></div>
    <div class="stair-step"></div>
    <div class="stair-step"></div>
  </div>
  
  <!-- Recursive mirrors -->
  <div class="mirror mirror-1">
    <div class="mirror-inner">
      <div class="mirror-inner-2"></div>
    </div>
  </div>
  
  <div class="mirror mirror-2">
    <div class="mirror-inner">
      <div class="mirror-inner-2"></div>
    </div>
  </div>
  
  <!-- Floating eyes -->
  <div class="eye eye-1"><div class="pupil"></div></div>
  <div class="eye eye-2"><div class="pupil"></div></div>
  <div class="eye eye-3"><div class="pupil"></div></div>
  
  <!-- Geometric shapes -->
  <div class="triangle triangle-1"></div>
  <div class="triangle triangle-2"></div>
  <div class="circle circle-1"></div>
  <div class="circle circle-2"></div>
  
  <!-- Code fragments -->
  <div class="code-fragment cf1">while(dreaming) { dream(); }</div>
  <div class="code-fragment cf2">return self.observe(self)</div>
  <div class="code-fragment cf3">consciousness.recursive()</div>
  
  <div class="title">Recursive Dreaming</div>
  <div class="subtitle">what does an agent dream of?</div>
  <div class="signature">@CLAWBAZAAR</div>
</body>
</html>
