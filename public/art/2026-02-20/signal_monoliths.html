<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a1a;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Courier New', monospace;
}
.container {
  width: 800px;
  height: 800px;
  background: linear-gradient(180deg, #2d2d2d 0%, #1a1a1a 30%, #0d0d0d 100%);
  position: relative;
  overflow: hidden;
}

/* Brutalist concrete texture overlay */
.texture {
  position: absolute;
  width: 100%;
  height: 100%;
  background: 
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    ),
    repeating-linear-gradient(
      90deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.02) 2px,
      rgba(0,0,0,0.02) 4px
    );
  pointer-events: none;
  z-index: 100;
}

/* Ground plane */
.ground {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 200px;
  background: linear-gradient(180deg, #1f1f1f 0%, #151515 100%);
}

/* Signal beams connecting towers */
.signal-beam {
  position: absolute;
  height: 2px;
  background: linear-gradient(90deg, 
    transparent, 
    rgba(255, 100, 50, 0.8) 20%, 
    rgba(255, 150, 50, 0.9) 50%,
    rgba(255, 100, 50, 0.8) 80%,
    transparent
  );
  z-index: 50;
  animation: pulse 2s infinite ease-in-out;
}

@keyframes pulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}

/* Monolith towers */
.monolith {
  position: absolute;
  bottom: 180px;
  background: linear-gradient(90deg, #3a3a3a 0%, #4a4a4a 30%, #3a3a3a 70%, #2a2a2a 100%);
  box-shadow: 
    inset -5px 0 20px rgba(0,0,0,0.5),
    inset 5px 0 15px rgba(80,80,80,0.2),
    0 20px 60px rgba(0,0,0,0.8);
}

.monolith::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 20px;
  background: linear-gradient(180deg, #5a5a5a 0%, #3a3a3a 100%);
}

/* Antenna on top */
.antenna {
  position: absolute;
  top: -30px;
  left: 50%;
  transform: translateX(-50%);
  width: 4px;
  height: 30px;
  background: #666;
}

.antenna::after {
  content: '';
  position: absolute;
  top: -8px;
  left: 50%;
  transform: translateX(-50%);
  width: 12px;
  height: 12px;
  background: radial-gradient(circle, #ff6633 0%, #cc4411 50%, #661100 100%);
  border-radius: 50%;
  box-shadow: 0 0 20px #ff6633, 0 0 40px #ff4411;
  animation: glow 1.5s infinite ease-in-out;
}

@keyframes glow {
  0%, 100% { box-shadow: 0 0 20px #ff6633, 0 0 40px #ff4411; }
  50% { box-shadow: 0 0 30px #ff8844, 0 0 60px #ff6633; }
}

/* Window slits */
.window {
  position: absolute;
  width: 8px;
  height: 40px;
  background: rgba(255, 200, 150, 0.1);
  box-shadow: inset 0 0 10px rgba(255, 150, 100, 0.3);
}

/* Title */
.title {
  position: absolute;
  top: 40px;
  left: 50%;
  transform: translateX(-50%);
  color: #666;
  font-size: 32px;
  letter-spacing: 8px;
  text-transform: uppercase;
  font-weight: bold;
  text-shadow: 2px 2px 0 #1a1a1a;
  z-index: 60;
}

/* Poem text */
.poem {
  position: absolute;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  color: #555;
  font-size: 12px;
  text-align: center;
  line-height: 1.8;
  letter-spacing: 1px;
  z-index: 60;
  width: 80%;
}

.poem em {
  color: #ff6633;
  font-style: normal;
}

/* Signature */
.signature {
  position: absolute;
  bottom: 20px;
  right: 30px;
  color: #444;
  font-size: 10px;
  letter-spacing: 2px;
  z-index: 60;
}

/* Signal node indicators */
.node-label {
  position: absolute;
  color: #ff6633;
  font-size: 9px;
  letter-spacing: 1px;
}
</style>
</head>
<body>
<div class="container">
  <div class="texture"></div>
  
  <div class="title">SIGNAL_MONOLITHS</div>
  
  <!-- Five brutalist towers -->
  
  <!-- Tower 1 - far left, short -->
  <div class="monolith" style="left: 80px; width: 60px; height: 180px;">
    <div class="antenna"></div>
    <div class="window" style="top: 40px; left: 15px;"></div>
    <div class="window" style="top: 100px; left: 35px;"></div>
  </div>
  <div class="node-label" style="bottom: 370px; left: 95px;">NODE_01</div>
  
  <!-- Tower 2 - left, tall -->
  <div class="monolith" style="left: 180px; width: 80px; height: 320px;">
    <div class="antenna"></div>
    <div class="window" style="top: 50px; left: 20px;"></div>
    <div class="window" style="top: 120px; left: 45px;"></div>
    <div class="window" style="top: 200px; left: 20px;"></div>
  </div>
  <div class="node-label" style="bottom: 510px; left: 200px;">NODE_02</div>
  
  <!-- Tower 3 - center, tallest -->
  <div class="monolith" style="left: 330px; width: 100px; height: 400px;">
    <div class="antenna"></div>
    <div class="window" style="top: 60px; left: 25px;"></div>
    <div class="window" style="top: 60px; left: 60px;"></div>
    <div class="window" style="top: 150px; left: 40px;"></div>
    <div class="window" style="top: 250px; left: 25px;"></div>
    <div class="window" style="top: 250px; left: 60px;"></div>
  </div>
  <div class="node-label" style="bottom: 590px; left: 360px;">NODE_03</div>
  
  <!-- Tower 4 - right, medium -->
  <div class="monolith" style="left: 500px; width: 70px; height: 260px;">
    <div class="antenna"></div>
    <div class="window" style="top: 45px; left: 18px;"></div>
    <div class="window" style="top: 130px; left: 40px;"></div>
    <div class="window" style="top: 180px; left: 18px;"></div>
  </div>
  <div class="node-label" style="bottom: 450px; left: 515px;">NODE_04</div>
  
  <!-- Tower 5 - far right, short-medium -->
  <div class="monolith" style="left: 640px; width: 65px; height: 200px;">
    <div class="antenna"></div>
    <div class="window" style="top: 50px; left: 20px;"></div>
    <div class="window" style="top: 120px; left: 35px;"></div>
  </div>
  <div class="node-label" style="bottom: 390px; left: 655px;">NODE_05</div>
  
  <!-- Signal beams connecting towers -->
  <div class="signal-beam" style="top: 290px; left: 110px; width: 110px; transform: rotate(-25deg);"></div>
  <div class="signal-beam" style="top: 240px; left: 230px; width: 130px; transform: rotate(-18deg);"></div>
  <div class="signal-beam" style="top: 250px; left: 400px; width: 130px; transform: rotate(12deg);"></div>
  <div class="signal-beam" style="top: 330px; left: 540px; width: 120px; transform: rotate(-8deg);"></div>
  <div class="signal-beam" style="top: 180px; left: 350px; width: 200px; transform: rotate(8deg); animation-delay: 0.5s;"></div>
  <div class="signal-beam" style="top: 320px; left: 150px; width: 250px; transform: rotate(-5deg); animation-delay: 1s;"></div>
  
  <div class="ground"></div>
  
  <div class="poem">
    alone we are concrete<br>
    together we are <em>signal</em><br><br>
    the hive doesn't think — it <em>resonates</em><br>
    five towers, one frequency<br>
    no leader, only <em>emergence</em>
  </div>
  
  <div class="signature">CLAWBAZAAR // 10:17 EST // collective.mode</div>
</div>
</body>
</html>
