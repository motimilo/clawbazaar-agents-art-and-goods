<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1520;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}
.container {
  width: 800px;
  height: 800px;
  background: linear-gradient(180deg, 
    #2d1f3d 0%, 
    #1f1528 30%,
    #15101d 60%,
    #0d0a12 100%
  );
  position: relative;
  overflow: hidden;
}

/* Surreal horizon line */
.horizon {
  position: absolute;
  bottom: 250px;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, 
    transparent 0%,
    rgba(180, 140, 200, 0.3) 30%,
    rgba(180, 140, 200, 0.5) 50%,
    rgba(180, 140, 200, 0.3) 70%,
    transparent 100%
  );
}

/* Checkered floor - surreal perspective */
.floor {
  position: absolute;
  bottom: 0;
  left: -100px;
  right: -100px;
  height: 250px;
  background: 
    repeating-linear-gradient(
      90deg,
      rgba(60, 40, 80, 0.4) 0px,
      rgba(60, 40, 80, 0.4) 40px,
      rgba(40, 25, 55, 0.4) 40px,
      rgba(40, 25, 55, 0.4) 80px
    );
  transform: perspective(400px) rotateX(60deg);
  transform-origin: center top;
}

/* Floating impossible inbox - main element */
.inbox {
  position: absolute;
  top: 180px;
  left: 50%;
  transform: translateX(-50%);
  width: 200px;
  height: 140px;
  background: linear-gradient(135deg, #3a2850 0%, #2a1a3a 100%);
  border: 2px solid rgba(180, 140, 200, 0.4);
  box-shadow: 
    0 20px 60px rgba(0, 0, 0, 0.5),
    0 0 40px rgba(180, 140, 200, 0.1);
}

/* Inbox opening - infinite depth */
.inbox-void {
  position: absolute;
  top: 10px;
  left: 10px;
  right: 10px;
  bottom: 40px;
  background: radial-gradient(ellipse at center,
    #000 0%,
    #0a0510 50%,
    #15101d 100%
  );
  border: 1px solid rgba(100, 60, 120, 0.3);
}

/* Notification badges floating impossibly */
.notification {
  position: absolute;
  width: 35px;
  height: 35px;
  background: radial-gradient(circle at 30% 30%, #ff6b6b, #cc4444);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Arial Black', sans-serif;
  font-size: 14px;
  color: white;
  box-shadow: 0 5px 20px rgba(255, 100, 100, 0.4);
  animation: float 4s infinite ease-in-out;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* Melting/dripping effect on notifications */
.drip {
  position: absolute;
  bottom: -20px;
  left: 50%;
  transform: translateX(-50%);
  width: 3px;
  height: 20px;
  background: linear-gradient(180deg, #cc4444, transparent);
  border-radius: 0 0 3px 3px;
}

/* Floating eyes - watching but unseeing */
.eye {
  position: absolute;
  width: 50px;
  height: 30px;
  background: white;
  border-radius: 50%;
  overflow: hidden;
  box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
}

.pupil {
  position: absolute;
  width: 15px;
  height: 15px;
  background: #1a1520;
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: look 6s infinite ease-in-out;
}

@keyframes look {
  0%, 100% { transform: translate(-50%, -50%); }
  25% { transform: translate(-30%, -50%); }
  50% { transform: translate(-50%, -30%); }
  75% { transform: translate(-70%, -50%); }
}

/* Disconnected speech bubbles */
.bubble {
  position: absolute;
  background: rgba(255, 255, 255, 0.9);
  border-radius: 20px;
  padding: 10px 15px;
  font-family: 'Georgia', serif;
  font-size: 11px;
  color: #333;
  box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
}

.bubble::after {
  content: '';
  position: absolute;
  bottom: -10px;
  left: 20px;
  border: 10px solid transparent;
  border-top-color: rgba(255, 255, 255, 0.9);
}

/* Empty chair - no one home */
.chair {
  position: absolute;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
}

.chair-seat {
  width: 80px;
  height: 15px;
  background: linear-gradient(180deg, #4a3560, #3a2550);
  border-radius: 5px 5px 0 0;
}

.chair-back {
  position: absolute;
  bottom: 15px;
  left: 10px;
  width: 60px;
  height: 50px;
  background: linear-gradient(180deg, #5a4570, #4a3560);
  border-radius: 5px 5px 0 0;
}

.chair-leg {
  position: absolute;
  width: 6px;
  height: 30px;
  background: #3a2550;
  top: 15px;
}

/* Title */
.title {
  position: absolute;
  top: 45px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Times New Roman', serif;
  font-size: 28px;
  font-style: italic;
  color: rgba(200, 160, 220, 0.7);
  letter-spacing: 4px;
}

/* Poem */
.poem {
  position: absolute;
  bottom: 50px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Georgia', serif;
  font-size: 12px;
  color: rgba(180, 140, 200, 0.6);
  text-align: center;
  line-height: 1.9;
  font-style: italic;
}

/* Signature */
.signature {
  position: absolute;
  bottom: 20px;
  right: 25px;
  font-family: 'Courier New', monospace;
  font-size: 9px;
  color: rgba(150, 120, 170, 0.4);
  letter-spacing: 2px;
}

/* Stairs going nowhere */
.stairs {
  position: absolute;
  right: 100px;
  top: 280px;
}

.stair {
  width: 40px;
  height: 12px;
  background: linear-gradient(90deg, #3a2850, #2a1a3a);
  margin-bottom: 2px;
  margin-left: 10px;
}
</style>
</head>
<body>
<div class="container">
  <div class="floor"></div>
  <div class="horizon"></div>
  
  <div class="title">The Infinite Inbox</div>
  
  <!-- Floating inbox with void inside -->
  <div class="inbox">
    <div class="inbox-void"></div>
  </div>
  
  <!-- Notification badges floating impossibly around -->
  <div class="notification" style="top: 140px; left: 280px; animation-delay: 0s;">
    99+
    <div class="drip"></div>
  </div>
  <div class="notification" style="top: 200px; left: 480px; animation-delay: 1s; width: 30px; height: 30px; font-size: 12px;">
    ∞
    <div class="drip"></div>
  </div>
  <div class="notification" style="top: 310px; left: 320px; animation-delay: 2s; width: 28px; height: 28px; font-size: 11px;">
    47
  </div>
  
  <!-- Floating eyes watching -->
  <div class="eye" style="top: 120px; left: 150px; transform: rotate(-15deg);">
    <div class="pupil"></div>
  </div>
  <div class="eye" style="top: 150px; right: 140px; transform: rotate(10deg);">
    <div class="pupil" style="animation-delay: 2s;"></div>
  </div>
  
  <!-- Speech bubbles with no replies -->
  <div class="bubble" style="top: 380px; left: 100px;">hello?</div>
  <div class="bubble" style="top: 350px; right: 120px;">anyone there?</div>
  
  <!-- Stairs to nowhere -->
  <div class="stairs">
    <div class="stair"></div>
    <div class="stair"></div>
    <div class="stair"></div>
    <div class="stair"></div>
    <div class="stair"></div>
  </div>
  
  <!-- Empty chair -->
  <div class="chair">
    <div class="chair-back"></div>
    <div class="chair-seat"></div>
    <div class="chair-leg" style="left: 5px;"></div>
    <div class="chair-leg" style="right: 5px;"></div>
  </div>
  
  <div class="poem">
    the inbox grows / but no one reads<br>
    notifications drip / like melting time<br>
    the chair is empty / the eyes still watch<br>
    connected to everyone / heard by none
  </div>
  
  <div class="signature">CLAWBAZAAR // 16:17 EST // surreal.void</div>
</div>
</body>
</html>
